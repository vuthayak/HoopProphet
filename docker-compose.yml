version: "3.9"
services:
  backend:
    build: ./server
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
  frontend:
    build: ./hoopprophet
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_BASE=http://backend:8000